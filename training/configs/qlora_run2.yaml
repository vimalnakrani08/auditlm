# Phase 3B run-2 QLoRA — GENTLER than run 1 (which over-perturbed: assertive disposition
# steamrolled good behavior, e.g. calc 1.00 -> 0.68). Run 2: 1 epoch (2 overfit), half LR,
# half rank, slightly lower scale. base + completions-only + grad-checkpoint unchanged.
# Data = run-2 train set (format-split: grounded reformat + plain regen + rebalanced safety),
# assembled after approval; iters set then for 1 epoch over that set.
model: "mlx-community/Meta-Llama-3.1-8B-Instruct-4bit"
train: true
fine_tune_type: lora
optimizer: adamw
data: "data/mlx_run2"
seed: 42
num_layers: 16
batch_size: 2
iters: 214           # 1 epoch over at assembly: ceil(train_size / batch_size) for 1 epoch (~140-160)
val_batches: 8
learning_rate: 5.0e-6     # half of run 1 (1e-5)
steps_per_report: 10
steps_per_eval: 40
save_every: 100
adapter_path: "adapter_run2"
max_seq_length: 4096
grad_checkpoint: true
mask_prompt: true
lora_parameters:
  rank: 8            # half of run 1 (16) — less adapter capacity, gentler
  scale: 16          # slightly below run 1 (20)
  dropout: 0.05
